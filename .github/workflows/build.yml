name: build

# Builds thomaz.nro in the cloud. This is the project's primary build path:
# the devkitPro package servers are Cloudflare-blocked from the maintainer's
# network, but GitHub's runners reach them fine. Download the .nro artifact
# from the run and copy it to the SD card (/switch/thomaz.nro).

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Borealis dependencies
        run: |
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm switch-glfw switch-mesa switch-glm

      - name: Merge Borealis runtime resources into romfs
        # Fills in shaders/fonts/material icons without clobbering our own
        # xml/i18n (cp -n = no-clobber).
        run: cp -rn lib/borealis/resources/* resources/

      - name: Build thomaz.nro
        run: make -j$(nproc)

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: thomaz-nro
          path: thomaz.nro
          if-no-files-found: error
