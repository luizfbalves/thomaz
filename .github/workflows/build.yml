name: build

# Builds thomaz.nro in the cloud (the maintainer's network is Cloudflare-blocked
# from the devkitPro servers; GitHub runners reach them fine). Built on the
# xfangfang/borealis fork via CMake. Download the .nro artifact and copy it to
# the SD card at /switch/thomaz.nro.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  switch:
    name: Nintendo Switch (.nro)
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build + Borealis dependencies
        run: |
          (command -v cmake >/dev/null 2>&1) || (apt-get update && apt-get install -y cmake)
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm switch-glfw switch-mesa switch-glm

      - name: Merge Borealis runtime resources into romfs
        # Fills in Borealis's fonts/material/i18n (brls.json) without clobbering
        # our own xml/i18n (cp -n = no-clobber).
        run: cp -rn lib/borealis/resources/* resources/

      - name: Configure (Switch)
        run: cmake -B build_switch -DPLATFORM_SWITCH=ON

      - name: Build thomaz.nro
        run: make -C build_switch thomaz.nro -j$(nproc)

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: thomaz-nro
          path: build_switch/thomaz.nro
          if-no-files-found: error
