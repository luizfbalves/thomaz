name: build

# Builds thomaz.nro in the cloud (the maintainer's network is Cloudflare-blocked
# from the devkitPro servers; GitHub runners use the prebuilt devkitpro/devkita64
# image which already bundles libnx + deko3d + cmake, so NO dkp-pacman is needed).
# Mirrors xfangfang/borealis's own CI. Download the .nro artifact and copy it to
# the SD card at /switch/thomaz.nro.

on:
  push:
    # Run on branch pushes only. Tags (v*) are excluded (release.yml builds the
    # .nro for tagged versions). `main` is also excluded: a merge to main would
    # otherwise rebuild the same commit the PR check already built — and on a
    # release that doubles up with release.yml on the tag. PRs (below) validate
    # before merge; the release tag validates after.
    branches:
      - '**'
      - '!main'
    # Don't rebuild the Switch NRO for changes that don't touch the app: the API
    # (api/**, deployed by api.yml), planning docs (docs/**), and landing page
    # (website/**, deployed by pages.yml) never affect it.
    paths-ignore:
      - 'api/**'
      - 'docs/**'
      - 'website/**'
  pull_request:
    # NO path filter here on purpose. This check is a REQUIRED status check for
    # merging into main (repo ruleset "pr"). A required check gated by a top-level
    # `paths` filter never gets created on a PR that misses the filter, leaving the
    # PR stuck "Expected — waiting for status" forever (you can't even bypass it
    # cleanly). So the job ALWAYS runs on every PR and reports a real green check;
    # the path detection moved INSIDE (see the `changed` step), which skips the
    # expensive build steps when only api/**, docs/**, or website/** changed.
  workflow_dispatch:

jobs:
  switch:
    name: Nintendo Switch (.nro)
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the PR base..head diff below resolves

      - name: Detect app changes
        id: changed
        shell: bash
        run: |
          # Non-PR events (branch push / manual dispatch) already passed the
          # trigger's path filter, so always build for them.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # This job runs inside the devkitpro container (root), but the checkout
          # is owned by the runner user, so git rejects the repo as "dubious
          # ownership" and reports "not a git repository". Whitelist it first.
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          # On a PR, build only when something OUTSIDE api/, docs/ and website/
          # changed (those are deployed by api.yml / pages.yml and never affect the
          # NRO). FAIL-SAFE: if the diff can't be computed for any reason, default
          # to building — never skip a real build (and never deadlock the check).
          app=true
          if files=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- '.' ':(exclude)api/**' ':(exclude)docs/**' ':(exclude)website/**' 2>/dev/null); then
            if [ -z "$files" ]; then
              app=false
              echo "Only api/, docs/ or website/ touched — skipping NRO build."
            fi
          else
            echo "git diff failed — building anyway (fail-safe)."
          fi
          echo "app=$app" >> "$GITHUB_OUTPUT"

      - name: Merge Borealis runtime resources into romfs
        # Fills in Borealis's fonts/material/i18n/shaders without clobbering our
        # own xml/i18n (cp -n = no-clobber). No network access required.
        if: steps.changed.outputs.app == 'true'
        run: cp -rn lib/borealis/resources/* resources/

      - name: Configure (Switch, deko3d)
        if: steps.changed.outputs.app == 'true'
        run: cmake -B build_switch -DCMAKE_BUILD_TYPE=Release -DPLATFORM_SWITCH=ON -DUSE_DEKO3D=ON

      - name: Build thomaz.nro
        if: steps.changed.outputs.app == 'true'
        run: make -C build_switch thomaz.nro -j$(nproc)

      - name: Upload NRO artifact
        if: steps.changed.outputs.app == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: thomaz-nro
          path: build_switch/thomaz.nro
          if-no-files-found: error
