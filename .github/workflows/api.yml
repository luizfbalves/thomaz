name: api

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  pull_request:
    # NO path filter here on purpose. This check is a REQUIRED status check for
    # merging into main (repo ruleset "pr"). A required check gated by a top-level
    # `paths` filter never gets created on a PR that misses the filter, leaving the
    # PR stuck "Expected — waiting for status" forever. So the job ALWAYS runs on
    # every PR and reports a real green check; the path detection moved INSIDE (see
    # the `changed` step), which skips the install/migrate/test steps when nothing
    # under api/ changed.
  workflow_dispatch:

jobs:
  test:
    name: API (Fastify + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thomaz
          POSTGRES_PASSWORD: thomaz
          POSTGRES_DB: thomaz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thomaz -d thomaz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql://thomaz:thomaz@localhost:5432/thomaz?schema=public
      JWT_SECRET: ci-jwt-secret-minimum-16
      PUBLIC_BASE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the PR base..head diff below resolves

      - name: Detect api changes
        id: changed
        working-directory: ${{ github.workspace }} # diff at repo root, not api/
        shell: bash
        run: |
          # Non-PR events (push to api paths / manual dispatch) already passed the
          # trigger's path filter, so always run for them.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On a PR, run only when something under api/ changed.
          files=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- 'api/**' '.github/workflows/api.yml')
          if [ -n "$files" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false (no api/ changes — skipping install/test)"
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.api == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        if: steps.changed.outputs.api == 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.changed.outputs.api == 'true'
        run: npx prisma generate

      - name: Apply migrations
        if: steps.changed.outputs.api == 'true'
        run: npx prisma migrate deploy

      - name: Type-check
        if: steps.changed.outputs.api == 'true'
        run: npm run typecheck

      - name: Run tests
        if: steps.changed.outputs.api == 'true'
        run: npm test

  deploy:
    name: Deploy to Lightsail
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          command_timeout: "20m"
          script: |
            set -euo pipefail
            cd ~/apps/thomaz
            git fetch origin main
            git reset --hard origin/main
            bash api/scripts/deploy.sh
