name: api

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

jobs:
  test:
    name: API (Fastify + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thomaz
          POSTGRES_PASSWORD: thomaz
          POSTGRES_DB: thomaz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thomaz -d thomaz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql://thomaz:thomaz@localhost:5432/thomaz?schema=public
      JWT_SECRET: ci-jwt-secret-minimum-16
      PUBLIC_BASE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Lightsail
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          command_timeout: "20m"
          script: |
            set -euo pipefail
            cd ~/apps/thomaz
            git fetch origin main
            git reset --hard origin/main
            bash api/scripts/deploy.sh
