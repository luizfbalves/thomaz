name: release

# Cutting a release: push a 3-part app-version tag like v0.2.0 (keep it in sync
# with source/app/version.hpp and CMakeLists VERSION_*). This builds thomaz.nro
# and attaches it to the GitHub Release for that tag — which is exactly what the
# in-app updater downloads (asset name: thomaz.nro).
#
# NOTE: the tag filter is restricted to 3-part numeric tags (vMAJOR.MINOR.PATCH)
# so GSD milestone tags like v1.1 / v2.0 do NOT trigger a release build. The
# in-app updater compares numerically (ignoring the 'v'), so a 2-part milestone
# tag would otherwise outrank the real app version and cause a bad self-update.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish thomaz.nro
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Merge Borealis runtime resources into romfs
        run: cp -rn lib/borealis/resources/* resources/

      - name: Configure (Switch, deko3d)
        run: cmake -B build_switch -DCMAKE_BUILD_TYPE=Release -DPLATFORM_SWITCH=ON -DUSE_DEKO3D=ON

      - name: Build thomaz.nro
        run: make -C build_switch thomaz.nro -j$(nproc)

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build_switch/thomaz.nro
          generate_release_notes: true
